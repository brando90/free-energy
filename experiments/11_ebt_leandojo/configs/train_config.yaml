defaults:
  - _self_

# Reference experiment sweep defaults, updated on 2026-06-29.
# Model defaults below use shared 256-dim per-token projections and concatenate
# chunk slots, so hidden_dim is inferred as 256 * data.chunk_size.
seed: 17
allow_cpu: false
compile_model: false
matmul_precision: medium

data:
  # Lean proof targets, tokenized with the unfiltered Goedel-Prover-V2-8B tokenizer.
  data_dir: ${hydra:runtime.cwd}/data/context_gold
  activations_dir: ${hydra:runtime.cwd}/data/goedel_activations/leanworkbook/hidden_states_safetensors
  indices_file: ${hydra:runtime.cwd}/data/leanworkbook_val500_indices.json
  split: train
  dataset_format: auto
  sources:
    - dataset_name: leanworkbook
      data_dir: ${hydra:runtime.cwd}/data/context_gold
      activations_dir: ${hydra:runtime.cwd}/data/goedel_activations/leanworkbook/hidden_states_safetensors
      indices_file: ${hydra:runtime.cwd}/data/leanworkbook_val500_indices.json
      dataset_format: leanworkbook
      split: train
    - dataset_name: leandojo
      data_dir: ${hydra:runtime.cwd}/data/leandojo_context_gold
      activations_dir: ${hydra:runtime.cwd}/data/goedel_activations/leandojo/hidden_states_safetensors
      indices_file: null
      dataset_format: leandojo
      split: train
  label_field: labels
  max_target_tokens: null
  # One EBT target position predicts this many full Goedel tokenizer tokens.
  chunk_size: 8
  max_items: null
  activation_dtype: bf16
  validate_context: true
  model_name: null
  model_revision: null

loader:
  # Capped batch size used by the current h512/l2/heads8 Muon sweep.
  batch_size: 32
  max_target_chunks_per_batch: null
  shuffle: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  drop_last: false

model:
  model_name: Goedel-LM/Goedel-Prover-V2-8B
  revision: null
  vocab_size: dataset
  pad_token_id: dataset
  eos_token_id: dataset
  bos_token_id: dataset

  # Goedel context activations are 4096-dim; project them into the EBT width.
  context_dim: 4096
  token_embed_dim: 256
  hidden_dim: null
  num_layers: 2
  num_heads: 16
  dim_feedforward: 8192
  max_target_positions: 4096
  dropout: 0.0

  mcmc_num_steps: 2
  mcmc_step_size: 0.5
  mcmc_step_size_learnable: true
  langevin_dynamics_noise: 0.0

  truncate_mcmc: false
  no_mcmc_detach: false
  loss_on_final_step_only: false

  clamp_futures_grad: false
  clamp_futures_grad_max_change: 9.0
  reconstruction_coeff: 1.0
  soften_target_prob_dist: 0.0

  denoising_initial_condition: random_noise
  gaussian_random_noise_scaling: 1.0
  normalize_initial_condition: true
  normalize_initial_condition_only_first_step: false

  absolute_clamp: 0.0
  norm_pred: false
  norm_pred_not_final_step: false
  sharpen_predicted_distribution: 0.0

optim:
  name: muon
  lr: 0.001
  weight_decay: 0.05
  momentum: 0.95
  nesterov: true
  ns_coefficients: [3.4445, -4.775, 2.0315]
  ns_steps: 5
  betas: [0.9, 0.999]
  eps: 1.0e-7
  adjust_lr_fn: null
  fused: true
  mcmc_step_size_lr_multiplier: 1.5
  use_scheduler: false
  min_lr_scale: 10
  max_scheduling_steps: 1000000
  warm_up_steps: 10000
  warm_up_base_lr_divider: -1

train:
  max_steps: 1000000
  grad_accum_steps: 32
  amp_bf16: true
  grad_clip_norm: 1.0
  log_every: 5
  # User-requested checkpoint cadence for these runs.
  save_every_steps: 1000
  keep_last_checkpoints: 3

validation:
  split: val
  # Compile validation cadence. Step 0 validation is always run before training.
  every_steps: 100
  max_items: null
  # Compile validation uses a deterministic random 50-row subset of the fixed
  # 500 validation indices to keep validation fast enough for frequent checks.
  random_sample_size: 25
  random_sample_seed: 17
  sources:
    - name: val_leanworkbook
      dataset_name: leanworkbook
      data_dir: ${hydra:runtime.cwd}/data/context_gold
      activations_dir: ${hydra:runtime.cwd}/data/goedel_activations/leanworkbook/hidden_states_safetensors
      indices_file: ${hydra:runtime.cwd}/data/leanworkbook_val500_indices.json
      dataset_format: leanworkbook
      split: val
      random_sample_size: 25
      random_sample_seed: 17
    - name: val_leandojo
      dataset_name: leandojo
      data_dir: ${hydra:runtime.cwd}/data/leandojo_context_gold
      activations_dir: ${hydra:runtime.cwd}/data/goedel_activations/leandojo/hidden_states_safetensors
      indices_file: null
      dataset_format: leandojo
      split: val
      random_sample_size: 25
      random_sample_seed: 17
  target_position_report_chunk_sizes: [1, 4, 8, 16]
  max_batches: null
  compile_enabled: true
  # Compile generated Lean proofs in parallel; sampling remains batched on GPU.
  compile_workers: 8
  sample_steps: null
  max_target_chunks: 4096
  target_chunks_from_labels: true
  compile_timeout: 600
  compile_expect_timeout: 120
  # Print every validation batch so validation does not appear hung.
  progress_every: 1
  repl_path: ${hydra:runtime.cwd}/repl
  lean_env_path: ${hydra:runtime.cwd}/repl/test/Mathlib

wandb:
  enabled: true
  project: free-energy-11-ebt-leandojo
  entity: null
  name: leandojo_lwb_chunk8_token256_l2_heads16_bs32
  tags: []

hydra:
  run:
    dir: ${hydra:runtime.cwd}/runs/leandojo_lwb_chunk${data.chunk_size}_token256_bs${loader.batch_size}_${now:%Y%m%d_%H%M%S}
