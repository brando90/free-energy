defaults:
  - _self_

seed: 17
allow_cpu: false
allow_non_val_split: false
compile_model: false
matmul_precision: medium

ebt_reference:
  source: third_party/EBT/job_scripts/nlp/pretrain/ebt_s1.sh
  profile: nlp_s1_xxs
  tokenizer: EleutherAI/gpt-neox-20b
  dataset_name: fineweb
  validation_split_pct: 0.0005
  val_check_interval: 15000

data:
  data_dir: ${hydra:runtime.cwd}/data/context_gold
  split: val
  splits: null
  families: null
  label_field: labels
  # Full 7k-token run setting used for the latest val/train+test experiments.
  max_target_tokens: 7000
  max_items: null
  activation_dtype: bf16
  validate_context: true
  model_name: null
  model_revision: null

loader:
  batch_size: 2
  max_target_tokens_per_batch: 14000
  shuffle: true
  num_workers: 12
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  drop_last: false

model:
  model_name: Goedel-LM/Goedel-Prover-V2-8B
  revision: null
  vocab_size: dataset
  pad_token_id: dataset

  # Transformer model
  context_dim: 4096 # size coming from conditioning (Goedel Prover)
  hidden_dim: 384 # internal EBT model
  num_layers: 4
  num_heads: 4
  dim_feedforward: 384
  max_target_positions: 16384 # target positional encoding size (for EBT training)
  dropout: 0.0
  
  # Langevin steps
  mcmc_num_steps: 2
  mcmc_step_size: 0.5
  mcmc_step_size_learnable: true # set the step size to be learnable.
  langevin_dynamics_noise: 0.0 # noise during langevin process

  # System 1/System 2 control
  # if true, the backwards computation graph will only be recorded on the LAST timestamp
  # if true, it also only does the reconstruct loss on the LAST timestamp
  truncate_mcmc: false   

  # if true, doesn't detach gradient every timestamp at all
  # if false, then it detaches the grad per timestamp
  no_mcmc_detach: false  
  
  # apply loss on only the final timestamp. If false, then it does an AVERAGE
  loss_on_final_step_only: false

  clamp_futures_grad: false
  clamp_futures_grad_max_change: 9.0
  reconstruction_coeff: 1.0 # coef of the final loss term (not clue why this is here)
  soften_target_prob_dist: 0.0

  # normalization initial conditions
  denoising_initial_condition: random_noise # the "potential" will be this.
  gaussian_random_noise_scaling: 1.0 # how much noise to init with; N(0,I)
  normalize_initial_condition: true # turn it into a softmax FIRST
  normalize_initial_condition_only_first_step: false # if false, we ALWAYS softmax before going to the EBT

  # reg after updating w/ grad (none of these actually happen)
  absolute_clamp: 0.0
  norm_pred: false
  norm_pred_not_final_step: false
  sharpen_predicted_distribution: 0.0

optim:
  lr: 0.0012
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8
  fused: true
  mcmc_step_size_lr_multiplier: 1.5
  use_scheduler: true
  min_lr_scale: 10
  max_scheduling_steps: 1000000
  warm_up_steps: 10000
  warm_up_base_lr_divider: -1

train:
  max_steps: 1000000
  grad_accum_steps: 32
  amp_bf16: true
  grad_clip_norm: 1.0
  log_every: 5
  save_every: 100
  keep_last_checkpoints: 3

validation:
  split: val
  every_steps: 100
  max_items: null
  max_batches: null

wandb:
  enabled: true
  project: free-energy-10-ebt-vb
  entity: null
  name: ebt_val_7k_4h_bs2_mcmc2_validate_val_1m
  tags: []

hydra:
  run:
    dir: ${hydra:runtime.cwd}/runs/target7k_4h_bs2_val_1m_${now:%Y%m%d_%H%M%S}
